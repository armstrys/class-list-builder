<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class List Optimizer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<template id="__bundler_thumbnail" data-bg-color="#F7F6F2">
  <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
    <rect width="120" height="80" fill="#F7F6F2"/>
    <!-- Three class columns -->
    <rect x="10" y="22" width="28" height="48" rx="3" fill="#fff" stroke="#E2E0D8" stroke-width="1"/>
    <rect x="46" y="22" width="28" height="48" rx="3" fill="#fff" stroke="#E2E0D8" stroke-width="1"/>
    <rect x="82" y="22" width="28" height="48" rx="3" fill="#fff" stroke="#E2E0D8" stroke-width="1"/>
    <!-- Column headers -->
    <rect x="10" y="22" width="28" height="10" rx="3" fill="#1a7a5e"/>
    <rect x="46" y="22" width="28" height="10" rx="3" fill="#1a7a5e"/>
    <rect x="82" y="22" width="28" height="10" rx="3" fill="#1a7a5e"/>
    <!-- Student rows -->
    <rect x="13" y="36" width="22" height="5" rx="2" fill="#E2E0D8"/>
    <rect x="13" y="44" width="22" height="5" rx="2" fill="#E2E0D8"/>
    <rect x="13" y="52" width="22" height="5" rx="2" fill="#E2E0D8"/>
    <rect x="49" y="36" width="22" height="5" rx="2" fill="#E2E0D8"/>
    <rect x="49" y="44" width="22" height="5" rx="2" fill="#E2E0D8"/>
    <rect x="49" y="52" width="22" height="5" rx="2" fill="#E2E0D8"/>
    <rect x="85" y="36" width="22" height="5" rx="2" fill="#E2E0D8"/>
    <rect x="85" y="44" width="22" height="5" rx="2" fill="#E2E0D8"/>
    <rect x="85" y="52" width="22" height="5" rx="2" fill="#E2E0D8"/>
    <!-- Title -->
    <rect x="10" y="10" width="60" height="7" rx="2" fill="#1C1B18" opacity=".15"/>
  </svg>
</template>
</head>
<body>
<div id="root"></div>

<!--
  Source files are loaded individually for development.
  The build script (build-standalone.js) concatenates them into a single
  inlined <script> tag in the dist/ output.
  Order matters: defaults → engine → data/io → components → app.
-->
<script type="text/babel" src="src/defaults.js"></script>
<script type="text/babel" src="src/optimizer.js"></script>
<script type="text/babel" src="src/sample-data.js"></script>
<script type="text/babel" src="src/csv.js"></script>
<script type="text/babel" src="src/components/HelpModal.js"></script>
<script type="text/babel" src="src/components/SettingsModal.js"></script>
<script type="text/babel" src="src/components/ImportModal.js"></script>
<script type="text/babel" src="src/components/StudentDetailModal.js"></script>
<script type="text/babel" src="src/components/StudentCard.js"></script>
<script type="text/babel" src="src/components/ClassColumn.js"></script>
<script type="text/babel" src="src/components/StatsStrip.js"></script>
<script type="text/babel" src="src/components/StudentFormModal.js"></script>
<script type="text/babel" src="src/components/SampleDataDialog.js"></script>
<script type="text/babel" src="src/components/SetupPage.js"></script>
<script type="text/babel" src="src/components/OptimizePage.js"></script>
<script type="text/babel" src="src/app.js"></script>
</body>
</html>
