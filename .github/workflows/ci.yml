name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run linter
      run: npm run lint

    - name: Check formatting
      run: npm run format:check
      continue-on-error: true

    - name: Run tests
      run: npm test

    - name: Build standalone
      run: npm run build

    - name: Check bundle size
      run: |
        BUNDLE_SIZE=$(stat -c%s dist/class-list-optimizer-v*.html)
        SIZE_MB=$(echo "scale=2; $BUNDLE_SIZE / 1024 / 1024" | bc)
        echo "Bundle size: ${SIZE_MB}MB"
        if (( $(echo "$SIZE_MB > 10.0" | bc -l) )); then
          echo "::error::Bundle size (${SIZE_MB}MB) exceeds 10MB limit"
          exit 1
        fi

    - name: Upload build artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
      with:
        name: standalone-html
        path: dist/class-list-optimizer-v*.html
