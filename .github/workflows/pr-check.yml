name: PR Checks

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  check-version-bump:
    name: Check Version Bump
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Get PR version
        id: pr-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "PR package.json version: $VERSION"

      - name: Checkout main branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: main
          path: main-branch

      - name: Get main version
        id: main-version
        run: |
          VERSION=$(node -p "require('./main-branch/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Main branch version: $VERSION"

      - name: Get APP_VERSION from defaults.js
        id: app-version
        run: |
          APP_VERSION=$(grep -oP 'const APP_VERSION = "\K[^"]+' src/defaults.js)
          echo "version=$APP_VERSION" >> $GITHUB_OUTPUT
          echo "APP_VERSION in defaults.js: $APP_VERSION"

      - name: Compare versions
        run: |
          PR_VERSION="${{ steps.pr-version.outputs.version }}"
          MAIN_VERSION="${{ steps.main-version.outputs.version }}"
          APP_VERSION="${{ steps.app-version.outputs.version }}"

          echo "Comparing versions:"
          echo "  PR version:     $PR_VERSION"
          echo "  Main version:   $MAIN_VERSION"
          echo "  APP_VERSION:    $APP_VERSION"

          # Check package.json version bump
          if [ "$PR_VERSION" = "$MAIN_VERSION" ]; then
            echo ""
            echo "❌ ERROR: Version has not been bumped!"
            echo ""
            echo "Please update package.json version before merging:"
            echo "  1. Edit package.json and bump the version"
            echo "  2. Commit and push the change"
            echo ""
            echo "Version format: MAJOR.MINOR.PATCH"
            echo "  - Minor bump (e.g., 0.3.0 -> 0.4.0): Increment MINOR for new features"
            echo "  - Major bump (e.g., 0.3.0 -> 1.0.0): Increment MAJOR for breaking changes"
            exit 1
          fi

          # Check APP_VERSION matches package.json
          if [ "$PR_VERSION" != "$APP_VERSION" ]; then
            echo ""
            echo "❌ ERROR: Version mismatch between package.json and defaults.js!"
            echo ""
            echo "  package.json version:  $PR_VERSION"
            echo "  APP_VERSION:           $APP_VERSION"
            echo ""
            echo "Please update src/defaults.js to match package.json:"
            echo "  const APP_VERSION = \"$PR_VERSION\";"
            exit 1
          fi

          echo ""
          echo "✅ All versions consistent and bumped: $MAIN_VERSION -> $PR_VERSION"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: check-version-bump

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
