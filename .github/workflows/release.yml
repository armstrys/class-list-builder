name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '22'

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build standalone file
        run: |
          node build-standalone.js

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Check if tag already exists
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists, skipping"
            exit 0
          fi
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2  # v2.2.3
        with:
          subject-path: 'dist/class-list-optimizer-v*.html'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe14e0d0b7edf5c92acbc5811fa854e950955  # v2.2.2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## What's Changed

            This release includes the bundled standalone version of Class List Optimizer.

            ### Version v${{ steps.version.outputs.version }}

            ### Assets
            - **class-list-optimizer-v${{ steps.version.outputs.version }}.html** - Self-contained HTML file with all dependencies inlined. Works offline.

            ### Build Verification
            This release includes a signed build attestation. Verify with:
            ```bash
            gh attestation verify class-list-optimizer-v${{ steps.version.outputs.version }}.html --repo armstrys/class-list-optimizer
            ```

            ### Usage
            Simply download and open the HTML file in any modern web browser. No internet connection required.
          files: |
            dist/class-list-optimizer-v${{ steps.version.outputs.version }}.html
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
